name: VIX Breadth Reversal Alert

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * 1-5"

jobs:
  run-alert:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BREADTH_THRESHOLD: "40"
      REGIME_USE_STRICT: "1"
      TOP_N: "2"
      STOP_LOSS_PCT: "0.06"
      TAKE_PROFIT_PCT: "0.10"
      MAX_HOLD_DAYS: "5"
      SPY_DROP_TRIGGER: "-1.0"
      VIX_MIN_LEVEL: "18"
      VIX_1D_JUMP_PCT: "12"
      VIX_3D_JUMP_PCT: "25"
      CANDIDATE_MIN_DROP: "-1.5"
      USE_VIX3M_FILTER: "0"
      HISTORY_DAYS: "730"
      DOWNLOAD_RETRIES: "3"
      DOWNLOAD_SLEEP_SEC: "2.5"
      BREADTH_BATCH_SIZE: "10"
      TIMEOUT: "20"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
